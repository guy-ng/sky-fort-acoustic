steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.vertex'
      - '-t'
      - 'gcr.io/interception-dashboard/acoustic-trainer:latest'
      - '.'
images:
  - 'gcr.io/interception-dashboard/acoustic-trainer:latest'
timeout: '1800s'
options:
  machineType: 'E2_HIGHCPU_8'
